  .breadcrumb-item:hover { color: #e2e8f0; }
  .breadcrumb-sep { color: #334155; margin: 0 6px; }

  .tree-line { position: absolute; left: 16px; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); }
  .tree-branch { position: absolute; left: 16px; top: 50%; width: 16px; height: 1px; background: rgba(255,255,255,0.06); }

  .count-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }

  .view-fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .expand-content { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; max-height: 0; opacity: 0; }
  .expand-content.open { max-height: 2000px; opacity: 1; }

  .search-input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .search-input:focus { outline: none; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }

  .stat-number { font-variant-numeric: tabular-nums; }

  /* Graph view */
  #graph-canvas { display: block; width: 100%; height: calc(100vh - 72px); cursor: grab; }
  #graph-canvas:active { cursor: grabbing; }
  #graph-canvas.dragging-node { cursor: grabbing; }

  .graph-tooltip { display: none !important; }

  .graph-hover-panel { position: fixed; z-index: 100; background: rgba(12,15,25,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 18px; pointer-events: none; width: 300px; max-height: 420px; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.7); }

  .graph-hover-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .view-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 6px; padding: 2px; border: 1px solid rgba(255,255,255,0.06); }

  .view-toggle button.active { background: rgba(255,255,255,0.08); color: #e2e8f0; }
  .view-toggle button:hover:not(.active) { color: #94a3b8; }

  .graph-legend { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 16px; font-size: 11px; color: #64748b; z-index: 10; }
  .graph-legend span { display: flex; align-items: center; gap: 5px; }

  .graph-controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 4px; z-index: 10; }
  .graph-controls button { width: 32px; height: 32px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #94a3b8; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .graph-controls button:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }

  .graph-filter-chip { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.15s; opacity: 0.5; }
  .graph-filter-chip.active { opacity: 1; }

let state = {
  view: 'overview', // 'overview' | 'pod' | 'role' | 'graph'
  activePod: null,
  activeRole: null,

  gifs: JSON.parse(localStorage.getItem('skillGraphGifs') || '{}'),
  search: '',
  graphFilter: null, // null = all pods, or pod id

// ─── GRAPH ENGINE v2 — Deterministic layout + animated particles ──────
let graphSim = null;

function initGraph(filterPodId) {
  const canvas = document.getElementById('graph-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let W, H;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();

  // ── Data ──
  const pods = filterPodId ? SKILL_GRAPH.filter(p => p.id === filterPodId) : SKILL_GRAPH;
  const nodes = [], edges = [];
  const podCount = pods.length;

  // Seeded RNG for organic but deterministic spacing
  let _seed = 42;
  function rng() { _seed = (_seed * 16807) % 2147483647; return (_seed - 1) / 2147483646; }

  // ── Center hub ──
  const hubNode = !filterPodId ? { id: '_hub', label: 'THE GIGA MARKETING TEAM', type: 'hub',
    color: '#a78bfa', r: 55, x: 0, y: 0, baseX: 0, baseY: 0, phase: 0 } : null;
  if (hubNode) nodes.push(hubNode);

  // ── Expansive layout — spread everything out ──
  const podOrbit = filterPodId ? 0 : 1100;
  const roleOrbit = filterPodId ? 450 : 340;
  const skillOrbit = 170;

  pods.forEach((pod, pi) => {
    const a = (pi / podCount) * Math.PI * 2 - Math.PI / 2;
    const rv = podOrbit * (0.88 + rng() * 0.24);
    const px = filterPodId ? 0 : Math.cos(a) * rv;
    const py = filterPodId ? 0 : Math.sin(a) * rv;
    const pn = { id: pod.id, label: pod.name, type: 'pod', color: pod.color,
      r: 30, x: px, y: py, baseX: px, baseY: py,
      desc: pod.description, phase: pi * 0.4, podData: pod, angle: a };
    nodes.push(pn);
    if (hubNode) edges.push({ source: hubNode, target: pn, level: 0 });

    const rc = pod.roles.length;
    pod.roles.forEach((role, ri) => {
      const spread = Math.min(Math.PI * 0.85, rc * 0.38);
      const ra = a - spread / 2 + (rc > 1 ? (ri / (rc - 1)) * spread : 0);
      const rrv = roleOrbit * (0.82 + rng() * 0.36);
      const rx = px + Math.cos(ra) * rrv;
      const ry = py + Math.sin(ra) * rrv;
      const rn = { id: role.id, label: role.name, type: 'role', color: pod.color,
        r: 14, x: rx, y: ry, baseX: rx, baseY: ry,
        parentPod: pod.id, phase: ri * 0.7 + pi, roleData: role };
      nodes.push(rn);
      edges.push({ source: pn, target: rn, level: 1 });

      const sc = role.skills.length;
      role.skills.forEach((skill, si) => {
        const sspread = Math.min(Math.PI * 0.75, sc * 0.32);
        const sa = ra - sspread / 2 + (sc > 1 ? (si / (sc - 1)) * sspread : 0);
        const srv = skillOrbit * (0.8 + rng() * 0.4);
        const sx = rx + Math.cos(sa) * srv;
        const sy = ry + Math.sin(sa) * srv;
        const sn = { id: skill.id, label: skill.name, type: 'skill', color: pod.color,
          r: 6, x: sx, y: sy, baseX: sx, baseY: sy,
          subs: skill.subs, parentRole: role.id, parentPod: pod.id,
          phase: si * 0.5 + ri + pi };
        nodes.push(sn);
        edges.push({ source: rn, target: sn, level: 2 });
      });
    });
  });

  // ── Camera — zoomed out to see the whole map ──
  let camX = 0, camY = 0, zoom = filterPodId ? 0.45 : 0.18;
  let dragging = false, dragNode = null, lastMouse = null;
  let hoveredNode = null;
  let animFrame = null, running = true, time = 0;

  function worldToScreen(wx, wy) { return [(wx - camX) * zoom + W / 2, (wy - camY) * zoom + H / 2]; }
  function screenToWorld(sx, sy) { return [(sx - W / 2) / zoom + camX, (sy - H / 2) / zoom + camY]; }

  // ── Draw ──
  function draw() {
    time += 0.016;
    ctx.fillStyle = '#080b12';
    ctx.fillRect(0, 0, W, H);

    // Gentle floating
    nodes.forEach(n => {
      if (n === dragNode) return;
      n.x = n.baseX + Math.sin(time * 0.3 + n.phase * 1.3) * 2;
      n.y = n.baseY + Math.sin(time * 0.5 + n.phase) * 2.5;
    });

    // ── World-space rendering ──
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(-camX, -camY);

    // Edges
    edges.forEach(e => {
      const isH = hoveredNode && (e.source === hoveredNode || e.target === hoveredNode);
      ctx.beginPath();
      ctx.moveTo(e.source.x, e.source.y);
      ctx.lineTo(e.target.x, e.target.y);
      if (e.level === 0) {
        ctx.strokeStyle = isH ? '#ffffff30' : '#ffffff08';
        ctx.lineWidth = isH ? 2.5 : 1.2;
      } else if (e.level === 1) {
        ctx.strokeStyle = isH ? e.source.color + '55' : e.source.color + '1a';
        ctx.lineWidth = isH ? 1.5 : 0.8;
      } else {
        ctx.strokeStyle = isH ? e.source.color + '44' : e.source.color + '0e';
        ctx.lineWidth = isH ? 1 : 0.5;
      }
      ctx.stroke();
    });

    // Skill nodes
    nodes.filter(n => n.type === 'skill').forEach(n => {
      const isH = hoveredNode === n;
      const isParentH = hoveredNode && hoveredNode.type === 'role' && hoveredNode.id === n.parentRole;
      const r = n.r * (isH ? 2 : isParentH ? 1.4 : 1);
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.color + (isH ? 'cc' : isParentH ? '88' : '35');
      if (isH) { ctx.shadowColor = n.color; ctx.shadowBlur = 10; }
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Role nodes
    nodes.filter(n => n.type === 'role').forEach(n => {
      const isH = hoveredNode === n;
      const isParentH = hoveredNode && hoveredNode.type === 'pod' && hoveredNode.id === n.parentPod;
      const r = n.r * (isH ? 1.4 : isParentH ? 1.2 : 1);
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.color + (isH ? 'dd' : isParentH ? '99' : '55');
      if (isH) { ctx.shadowColor = n.color; ctx.shadowBlur = 16; }
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Pod nodes
    nodes.filter(n => n.type === 'pod').forEach(n => {
      const isH = hoveredNode === n;
      const r = n.r * (isH ? 1.15 : 1);
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 6, 0, Math.PI * 2);
      ctx.strokeStyle = n.color + (isH ? '30' : '14');
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, 0, n.x, n.y, r);
      g.addColorStop(0, '#ffffff25');
      g.addColorStop(0.5, n.color);
      g.addColorStop(1, n.color + 'bb');
      ctx.fillStyle = g;
      ctx.shadowColor = n.color;
      ctx.shadowBlur = isH ? 30 : 14;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Hub node
    if (hubNode) {
      const r = hubNode.r;
      for (let i = 4; i >= 1; i--) {
        ctx.beginPath();
        ctx.arc(0, 0, r + i * 18, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(167,139,250,${0.02 + i * 0.015})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      const hg = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
      hg.addColorStop(0, '#ffffff');
      hg.addColorStop(0.25, '#c4b5fd');
      hg.addColorStop(0.55, '#7c3aed');
      hg.addColorStop(1, '#4c1d95');
      ctx.fillStyle = hg;
      ctx.shadowColor = '#7c3aed';
      ctx.shadowBlur = 50;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.restore();

    // ── Screen-space labels (always readable, not scaled by zoom) ──

    // Hub label
    if (hubNode) {
      const [hx, hy] = worldToScreen(hubNode.x, hubNode.y);
      const sr = hubNode.r * zoom;
      ctx.textAlign = 'center';
      if (sr > 8) {
        ctx.font = '900 15px Inter, sans-serif';
        ctx.fillStyle = '#ffffffdd';
        ctx.fillText('THE GIGA', hx, hy - 3);
        ctx.fillText('MARKETING TEAM', hx, hy + 14);
      } else {
        ctx.font = '800 11px Inter, sans-serif';
        ctx.fillStyle = '#ffffffbb';
        ctx.fillText('GIGA MARKETING', hx, hy + 4);
      }
    }

    // Pod labels — always visible
    nodes.filter(n => n.type === 'pod').forEach(n => {
      const [sx, sy] = worldToScreen(n.x, n.y);
      if (sx < -150 || sx > W + 150 || sy < -50 || sy > H + 50) return;
      const sr = n.r * zoom;
      const isH = hoveredNode === n;
      ctx.textAlign = 'center';
      ctx.font = `${isH ? 800 : 700} 13px Inter, sans-serif`;
      ctx.fillStyle = '#000000aa';
      ctx.fillText(n.label, sx + 0.5, sy + sr + 16 + 0.5);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(n.label, sx, sy + sr + 16);
    });

    // Role labels — visible when zoomed past 0.22
    if (zoom > 0.22) {
      nodes.filter(n => n.type === 'role').forEach(n => {
        const [sx, sy] = worldToScreen(n.x, n.y);
        if (sx < -120 || sx > W + 120 || sy < -40 || sy > H + 40) return;
        const sr = n.r * zoom;
        const isH = hoveredNode === n;
        const isParentH = hoveredNode && hoveredNode.type === 'pod' && hoveredNode.id === n.parentPod;
        ctx.textAlign = 'center';
        ctx.font = `${isH ? 600 : 500} ${isH ? 11 : 10}px Inter, sans-serif`;
        ctx.fillStyle = isH ? '#ffffff' : isParentH ? '#cbd5e1' : '#8892a4';
        const lbl = n.label.length > 30 ? n.label.slice(0, 28) + '..' : n.label;
        ctx.fillText(lbl, sx, sy + sr + 13);
      });
    }

    // Skill labels — visible when zoomed past 0.45
    if (zoom > 0.45) {
      nodes.filter(n => n.type === 'skill').forEach(n => {
        const [sx, sy] = worldToScreen(n.x, n.y);
        if (sx < -100 || sx > W + 100 || sy < -30 || sy > H + 30) return;
        const sr = n.r * zoom;
        const isH = hoveredNode === n;
        const isParentH = hoveredNode && hoveredNode.type === 'role' && hoveredNode.id === n.parentRole;
        ctx.textAlign = 'center';
        ctx.font = `${isH ? 600 : 400} ${isH ? 10 : 9}px Inter, sans-serif`;
        ctx.fillStyle = isH ? '#e2e8f0' : isParentH ? '#94a3b8' : '#556270';
        const lbl = n.label.length > 26 ? n.label.slice(0, 24) + '..' : n.label;
        ctx.fillText(lbl, sx, sy + sr + 10);
      });
    }

    if (running) animFrame = requestAnimationFrame(draw);
  }

  // ── Hover panel ──
  const hoverPanel = document.getElementById('graph-hover-panel');

  function showHoverPanel(node, mx, my) {
    let html = '';
    if (node.type === 'hub') {
      const stats = getStats();
      html = `<div style="border-bottom:2px solid #7c3aed; padding-bottom:8px; margin-bottom:10px;">
        <div style="font-size:15px; font-weight:800; color:#fff;">THE GIGA MARKETING TEAM</div>
        <div style="font-size:11px; color:#a78bfa; margin-top:4px;">AI Agent Capability Map</div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div style="background:rgba(124,58,237,0.1); padding:8px; border-radius:6px; text-align:center;">
          <div style="font-size:18px; font-weight:800; color:#c4b5fd;">${stats.pods}</div>
          <div style="font-size:9px; color:#7c3aed; text-transform:uppercase; letter-spacing:1px;">Pods</div>
        </div>
        <div style="background:rgba(124,58,237,0.1); padding:8px; border-radius:6px; text-align:center;">
          <div style="font-size:18px; font-weight:800; color:#c4b5fd;">${stats.roles}</div>
          <div style="font-size:9px; color:#7c3aed; text-transform:uppercase; letter-spacing:1px;">Roles</div>
        </div>
        <div style="background:rgba(124,58,237,0.1); padding:8px; border-radius:6px; text-align:center;">
          <div style="font-size:18px; font-weight:800; color:#c4b5fd;">${stats.skills}</div>
          <div style="font-size:9px; color:#7c3aed; text-transform:uppercase; letter-spacing:1px;">Skills</div>
        </div>
        <div style="background:rgba(124,58,237,0.1); padding:8px; border-radius:6px; text-align:center;">
          <div style="font-size:18px; font-weight:800; color:#c4b5fd;">${stats.subs}</div>
          <div style="font-size:9px; color:#7c3aed; text-transform:uppercase; letter-spacing:1px;">Competencies</div>
        </div>
      </div>`;
    } else if (node.type === 'pod') {
      const pod = node.podData;
      const totalSkills = pod.roles.reduce((a, r) => a + r.skills.length, 0);
      const totalSubs = pod.roles.reduce((a, r) => a + r.skills.reduce((b, s) => b + s.subs.length, 0), 0);
      html = `<div style="border-bottom:2px solid ${node.color}; padding-bottom:8px; margin-bottom:10px;">
        <div style="color:${node.color}; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:3px">Pod</div>
        <div style="font-size:14px; font-weight:700; color:#fff;">${node.label}</div>
        <div style="font-size:11px; color:#64748b; margin-top:3px;">${node.desc}</div>
        <div style="font-size:10px; color:#475569; margin-top:5px;">${pod.roles.length} roles · ${totalSkills} skills · ${totalSubs} competencies</div>
      </div>`;
      pod.roles.forEach(role => {
        html += `<div style="padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04);">
          <div style="font-size:11px; font-weight:600; color:#e2e8f0;">${role.name}</div>
          <div style="display:flex; flex-wrap:wrap; gap:3px; margin-top:4px;">
            ${role.skills.map(s => `<span style="font-size:9px; padding:2px 6px; border-radius:3px; background:${node.color}12; color:${node.color}; border:1px solid ${node.color}20;">${s.name}</span>`).join('')}
          </div>
        </div>`;
      });
    } else if (node.type === 'role') {
      const pod = SKILL_GRAPH.find(p => p.id === node.parentPod);
      const role = node.roleData;
      html = `<div style="border-bottom:2px solid ${node.color}; padding-bottom:8px; margin-bottom:10px;">
        <div style="color:${node.color}; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:3px">${pod ? pod.name : 'Role'}</div>
        <div style="font-size:14px; font-weight:700; color:#fff;">${node.label}</div>
        <div style="font-size:10px; color:#475569; margin-top:3px;">${role.skills.length} skills · ${role.skills.reduce((a, s) => a + s.subs.length, 0)} competencies</div>
      </div>`;
      if (role) {
        role.skills.forEach(skill => {
          html += `<div style="padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="font-size:11px; font-weight:500; color:#cbd5e1;">${skill.name}</div>
            <div style="display:flex; flex-wrap:wrap; gap:3px; margin-top:3px;">
              ${skill.subs.map(s => `<span style="font-size:9px; padding:1px 5px; border-radius:3px; background:rgba(255,255,255,0.04); color:#64748b;">${s}</span>`).join('')}
            </div>
          </div>`;
        });
      }
    } else if (node.type === 'skill') {
      const pod = SKILL_GRAPH.find(p => p.id === node.parentPod);
      html = `<div style="border-bottom:2px solid ${node.color}; padding-bottom:8px; margin-bottom:10px;">
        <div style="color:${node.color}; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:3px">${pod ? pod.name : 'Skill'}</div>
        <div style="font-size:14px; font-weight:700; color:#fff;">${node.label}</div>
        <div style="font-size:10px; color:#475569; margin-top:3px;">${node.subs.length} atomic competencies</div>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:4px;">
        ${node.subs.map(s => `<span style="font-size:10px; padding:3px 8px; border-radius:4px; background:${node.color}12; color:${node.color}; border:1px solid ${node.color}20;">${s}</span>`).join('')}
      </div>`;
    }
    hoverPanel.innerHTML = html;
    hoverPanel.style.display = 'block';
    let px = mx + 20, py = my - 20;
    if (px + 320 > window.innerWidth) px = mx - 330;
    if (py + 440 > window.innerHeight) py = window.innerHeight - 440;
    if (py < 10) py = 10;
    hoverPanel.style.left = px + 'px';
    hoverPanel.style.top = py + 'px';
  }

  function hideHoverPanel() { hoverPanel.style.display = 'none'; }

  // ── Hit detection — hub, pods, roles, skills ──
  function findNode(sx, sy) {
    const [wx, wy] = screenToWorld(sx, sy);
    const ordered = [
      ...(hubNode ? [hubNode] : []),
      ...nodes.filter(n => n.type === 'pod'),
      ...nodes.filter(n => n.type === 'role'),
      ...nodes.filter(n => n.type === 'skill')
    ];
    for (const n of ordered) {
      const dx = wx - n.x, dy = wy - n.y;
      const hitR = Math.max(n.r * 2, 14);
      if (dx * dx + dy * dy < hitR * hitR) return n;
    }
    return null;
  }

  // ── Mouse events ──
  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const node = findNode(e.clientX - rect.left, e.clientY - rect.top);
    if (node && node.type !== 'hub') { dragNode = node; canvas.classList.add('dragging-node'); }
    else dragging = true;
    lastMouse = { x: e.clientX, y: e.clientY };
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (dragNode) {
      const [wx, wy] = screenToWorld(mx, my);
      dragNode.x = wx; dragNode.y = wy;
      dragNode.baseX = wx; dragNode.baseY = wy;
    } else if (dragging && lastMouse) {
      camX -= (e.clientX - lastMouse.x) / zoom;
      camY -= (e.clientY - lastMouse.y) / zoom;
      lastMouse = { x: e.clientX, y: e.clientY };
    } else {
      const node = findNode(mx, my);
      if (node !== hoveredNode) {
        hoveredNode = node;
        node ? showHoverPanel(node, e.clientX, e.clientY) : hideHoverPanel();
      } else if (node) {
        showHoverPanel(node, e.clientX, e.clientY);
      }
    }
  });

  canvas.addEventListener('mouseup', () => { dragging = false; dragNode = null; lastMouse = null; canvas.classList.remove('dragging-node'); });
  canvas.addEventListener('mouseleave', () => { dragging = false; dragNode = null; lastMouse = null; hoveredNode = null; hideHoverPanel(); canvas.classList.remove('dragging-node'); });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const [wx, wy] = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    zoom = Math.max(0.06, Math.min(10, zoom * (e.deltaY > 0 ? 0.9 : 1.11)));
    camX = wx - (e.clientX - rect.left - W / 2) / zoom;
    camY = wy - (e.clientY - rect.top - H / 2) / zoom;
  }, { passive: false });

  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    const node = findNode(e.clientX - rect.left, e.clientY - rect.top);
    if (!node) return;
    if (node.type === 'pod') setState({ view: 'pod', activePod: node.id, search: '' });
    else if (node.type === 'role') setState({ view: 'role', activePod: node.parentPod, activeRole: node.id, search: '' });
    else if (node.type === 'skill') { setState({ view: 'role', activePod: node.parentPod, activeRole: node.parentRole, search: '' }); setTimeout(() => setState({ expandedSkills: { ...state.expandedSkills, [node.id]: true } }), 50); }
  });

  window.graphZoomIn = () => { zoom = Math.min(10, zoom * 1.4); };
  window.graphZoomOut = () => { zoom = Math.max(0.06, zoom * 0.7); };
  window.graphReset = () => { zoom = filterPodId ? 0.45 : 0.18; camX = 0; camY = 0; };

  const onResize = () => resize();
  window.addEventListener('resize', onResize);
  graphSim = { stop: () => { running = false; cancelAnimationFrame(animFrame); window.removeEventListener('resize', onResize); hideHoverPanel(); } };

  draw();
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function saveGif(skillId, dataUrl) {
  state.gifs[skillId] = dataUrl;
  localStorage.setItem('skillGraphGifs', JSON.stringify(state.gifs));
  render();
}

function removeGif(skillId) {
  delete state.gifs[skillId];
  localStorage.setItem('skillGraphGifs', JSON.stringify(state.gifs));
  render();
}

function toggleSkill(skillId) {
  state.expandedSkills[skillId] = !state.expandedSkills[skillId];
  render();
}

// ─── STATS ────────────────────────────────────────────────────────────
function getStats() {
  let roles = 0, skills = 0, subs = 0;
  SKILL_GRAPH.forEach(pod => {
    pod.roles.forEach(role => {
      roles++;
      role.skills.forEach(skill => {
        skills++;
        subs += skill.subs.length;
      });
    });
  });
  return { pods: SKILL_GRAPH.length, roles, skills, subs };
}

function getPodStats(pod) {
  let skills = 0, subs = 0;
  pod.roles.forEach(r => { r.skills.forEach(s => { skills++; subs += s.subs.length; }); });
  return { roles: pod.roles.length, skills, subs };
}

// ─── SEARCH ───────────────────────────────────────────────────────────
function getSearchResults(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase();
  const results = [];
  SKILL_GRAPH.forEach(pod => {
    pod.roles.forEach(role => {
      role.skills.forEach(skill => {
        const nameMatch = skill.name.toLowerCase().includes(q);
        const subMatches = skill.subs.filter(s => s.toLowerCase().includes(q));
        if (nameMatch || subMatches.length > 0) {
          results.push({ pod, role, skill, subMatches, nameMatch });
        }
      });
      if (role.name.toLowerCase().includes(q)) {
        results.push({ pod, role, skill: null, subMatches: [], nameMatch: true });
      }
    });
    if (pod.name.toLowerCase().includes(q)) {
      results.push({ pod, role: null, skill: null, subMatches: [], nameMatch: true });
    }
  });
  return results.slice(0, 20);
}

// ─── GIF HANDLER ──────────────────────────────────────────────────────
function handleGifUpload(skillId, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => saveGif(skillId, e.target.result);
  reader.readAsDataURL(file);
}

function setupGifZone(el, skillId) {
  if (!el || el._gifSetup) return;
  el._gifSetup = true;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/gif,image/*';
  input.style.display = 'none';
  el.appendChild(input);

  el.addEventListener('click', (e) => {
    if (e.target.closest('.gif-remove')) return;
    input.click();
  });
  input.addEventListener('change', () => { if (input.files[0]) handleGifUpload(skillId, input.files[0]); });
  el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', (e) => { e.preventDefault(); el.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleGifUpload(skillId, e.dataTransfer.files[0]); });
}

// ─── RENDER FUNCTIONS ─────────────────────────────────────────────────

            </div>

            <div class="hidden sm:flex items-center gap-4 text-xs text-slate-500">
              <span><span class="stat-number text-white font-semibold">${stats.pods}</span> pods</span>
              <span class="text-slate-700">|</span>
              <span><span class="stat-number text-white font-semibold">${stats.roles}</span> roles</span>
              <span class="text-slate-700">|</span>

              <span class="text-slate-700">|</span>
              <span><span class="stat-number text-white font-semibold">${stats.subs}</span> atomic competencies</span>
            </div>
            <div class="view-toggle">
              <button class="${state.view !== 'graph' ? 'active' : ''}" onclick="if(state.view==='graph'){setState({view:'overview',activePod:null,activeRole:null})}">Cards</button>
              <button class="${state.view === 'graph' ? 'active' : ''}" onclick="setState({view:'graph',activePod:null,activeRole:null,search:''})">Graph</button>
            </div>
            <input
              type="text"
              placeholder="Search skills..."
              class="search-input w-48 px-3 py-1.5 rounded-md text-sm text-slate-300 placeholder:text-slate-600"
              value="${state.search}"
              oninput="setState({ search: this.value, view: this.value.length >= 2 ? 'search' : (state.activePod ? (state.activeRole ? 'role' : 'pod') : 'overview') })"
            />
          </div>
        </div>
        ${breadcrumbs ? `<div class="flex items-center text-xs">${breadcrumbs}</div>` : ''}

    </header>
  `;
}

function buildBreadcrumbs() {
  const parts = [];
  parts.push(`<span class="breadcrumb-item ${state.view === 'overview' ? 'text-white font-medium' : ''}" onclick="setState({ view: 'overview', activePod: null, activeRole: null, search: '' })">All Pods</span>`);
  if (state.activePod) {
    const pod = SKILL_GRAPH.find(p => p.id === state.activePod);
    if (pod) {
      parts.push(`<span class="breadcrumb-sep">/</span>`);
      parts.push(`<span class="breadcrumb-item ${state.view === 'pod' ? 'font-medium' : ''}" style="${state.view === 'pod' ? 'color:'+pod.color : ''}" onclick="setState({ view: 'pod', activeRole: null, search: '' })">${pod.name}</span>`);
    }
    if (state.activeRole) {
      const role = pod?.roles.find(r => r.id === state.activeRole);
      if (role) {
        parts.push(`<span class="breadcrumb-sep">/</span>`);
        parts.push(`<span class="breadcrumb-item text-white font-medium">${role.name}</span>`);
      }
    }
  }
  if (state.search) {
    parts.push(`<span class="breadcrumb-sep">/</span>`);
    parts.push(`<span class="text-slate-400">Search: "${state.search}"</span>`);
  }
  return parts.length > 1 ? parts.join('') : '';
}

function renderOverview() {
  return `
    <div class="view-fade-in max-w-[1400px] mx-auto px-6 py-8">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-white mb-1">Skill Pods</h2>
        <p class="text-sm text-slate-500">10 functional verticals. Click to drill down into roles, skills, and atomic competencies.</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-4 gap-4">
        ${SKILL_GRAPH.map(pod => {
          const s = getPodStats(pod);
          return `
            <div class="pod-card rounded-xl p-5 bg-white/[0.02] cursor-pointer" onclick="setState({ view: 'pod', activePod: '${pod.id}' })">
              <div class="flex items-start justify-between mb-3">
                <div class="w-3 h-3 rounded-full" style="background: ${pod.color}"></div>
                <div class="flex items-center gap-1.5">
                  <span class="count-badge text-white/60" style="background: ${pod.color}22; color: ${pod.color}">${s.roles} roles</span>
                </div>
              </div>
              <h3 class="text-[15px] font-semibold text-white mb-1">${pod.name}</h3>
              <p class="text-xs text-slate-500 leading-relaxed mb-4">${pod.description}</p>
              <div class="flex items-center gap-3 text-[11px] text-slate-600">
                <span>${s.skills} skills</span>
                <span>${s.subs} competencies</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderPod() {
  const pod = SKILL_GRAPH.find(p => p.id === state.activePod);
  if (!pod) return '';
  return `
    <div class="view-fade-in max-w-[1400px] mx-auto px-6 py-8">
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-3 h-3 rounded-full" style="background: ${pod.color}"></div>
          <h2 class="text-2xl font-bold text-white">${pod.name}</h2>
        </div>
        <p class="text-sm text-slate-500">${pod.description}</p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        ${pod.roles.map(role => {
          const skillCount = role.skills.length;
          const subCount = role.skills.reduce((a, s) => a + s.subs.length, 0);
          const gifCount = role.skills.filter(s => state.gifs[s.id]).length;
          return `
            <div class="pod-card rounded-xl p-5 bg-white/[0.02] cursor-pointer" onclick="setState({ view: 'role', activeRole: '${role.id}' })">
              <div class="flex items-start justify-between mb-3">
                <h3 class="text-[15px] font-semibold text-white leading-snug pr-2">${role.name}</h3>
                ${gifCount > 0 ? `<span class="count-badge shrink-0" style="background: ${pod.color}22; color: ${pod.color}">${gifCount} GIF${gifCount > 1 ? 's' : ''}</span>` : ''}
              </div>
              <div class="space-y-1.5 mb-4">
                ${role.skills.map(skill => `
                  <div class="flex items-center gap-2 text-xs">
                    <div class="w-1.5 h-1.5 rounded-full shrink-0" style="background: ${pod.color}66"></div>
                    <span class="text-slate-400 truncate">${skill.name}</span>
                    <span class="text-slate-600 shrink-0">${skill.subs.length}</span>
                  </div>
                `).join('')}
              </div>
              <div class="flex items-center gap-3 text-[11px] text-slate-600 pt-3 border-t border-white/[0.04]">
                <span>${skillCount} skills</span>
                <span>${subCount} competencies</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderRole() {
  const pod = SKILL_GRAPH.find(p => p.id === state.activePod);
  const role = pod?.roles.find(r => r.id === state.activeRole);
  if (!pod || !role) return '';

  return `
    <div class="view-fade-in max-w-[1000px] mx-auto px-6 py-8">
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-3 h-3 rounded-full" style="background: ${pod.color}"></div>
          <h2 class="text-xl font-bold text-white">${role.name}</h2>
        </div>
        <p class="text-sm text-slate-500">${pod.name} &mdash; ${role.skills.length} skills, ${role.skills.reduce((a,s) => a + s.subs.length, 0)} atomic competencies</p>
      </div>
      <div class="space-y-3">
        ${role.skills.map(skill => renderSkillNode(skill, pod.color)).join('')}

    </div>
  `;
}

function renderSkillNode(skill, color) {
  const isOpen = state.expandedSkills[skill.id];
  const hasGif = state.gifs[skill.id];

  return `
    <div class="skill-node rounded-xl border border-white/[0.06] bg-white/[0.015] overflow-hidden">
      <div class="flex items-center gap-3 p-4 cursor-pointer select-none" onclick="toggleSkill('${skill.id}')">
        <div class="w-6 h-6 rounded-md flex items-center justify-center shrink-0" style="background: ${color}15">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="transform: rotate(${isOpen ? '90' : '0'}deg); transition: transform 0.15s">
            <path d="M4.5 2.5L8 6L4.5 9.5" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <span class="text-sm font-medium text-white">${skill.name}</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          ${hasGif ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-500/10 text-emerald-400 font-medium">GIF</span>' : ''}
          <span class="text-[11px] text-slate-600">${skill.subs.length} competencies</span>
        </div>
      </div>
      <div class="expand-content ${isOpen ? 'open' : ''}">
        <div class="px-4 pb-4">
          <div class="flex gap-4">
            <div class="flex-1">
              <div class="flex flex-wrap gap-1.5">
                ${skill.subs.map(sub => `<span class="sub-skill-tag">${sub}</span>`).join('')}
              </div>
            </div>
            <div class="w-32 shrink-0">
              <div class="gif-zone w-full h-24 flex items-center justify-center" id="gif-${skill.id}">
                ${hasGif
                  ? `<img src="${state.gifs[skill.id]}" alt="${skill.name}"/><button class="gif-remove absolute top-1 right-1 w-5 h-5 rounded-full bg-black/60 text-white text-xs flex items-center justify-center hover:bg-red-500/80" onclick="event.stopPropagation(); removeGif('${skill.id}')">&times;</button>`
                  : `<div class="text-center"><div class="text-slate-600 text-[10px] mb-0.5">Drop .gif</div><div class="text-slate-700 text-[9px]">or click</div></div>`
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSearch() {
  const results = getSearchResults(state.search);
  return `
    <div class="view-fade-in max-w-[1000px] mx-auto px-6 py-8">
      <div class="mb-6">
        <h2 class="text-lg font-semibold text-white mb-1">${results.length} result${results.length !== 1 ? 's' : ''} for "${state.search}"</h2>
      </div>
      <div class="space-y-2">
        ${results.length === 0 ? '<p class="text-slate-500 text-sm">No matching skills found.</p>' : ''}
        ${results.map(r => {
          if (!r.skill && !r.role) {
            return `
              <div class="pod-card rounded-lg p-4 bg-white/[0.02] cursor-pointer" onclick="setState({ view: 'pod', activePod: '${r.pod.id}', search: '' })">
                <div class="flex items-center gap-2">
                  <div class="w-2.5 h-2.5 rounded-full" style="background: ${r.pod.color}"></div>
                  <span class="text-sm font-medium text-white">${r.pod.name}</span>
                  <span class="text-[11px] text-slate-600">pod</span>
                </div>
              </div>
            `;
          }
          if (!r.skill) {
            return `
              <div class="pod-card rounded-lg p-4 bg-white/[0.02] cursor-pointer" onclick="setState({ view: 'role', activePod: '${r.pod.id}', activeRole: '${r.role.id}', search: '' })">
                <div class="flex items-center gap-2 mb-1">
                  <div class="w-2.5 h-2.5 rounded-full" style="background: ${r.pod.color}"></div>
                  <span class="text-sm font-medium text-white">${r.role.name}</span>
                  <span class="text-[11px] text-slate-600">role</span>
                </div>
                <div class="text-[11px] text-slate-600">${r.pod.name}</div>
              </div>
            `;
          }
          return `
            <div class="pod-card rounded-lg p-4 bg-white/[0.02] cursor-pointer" onclick="setState({ view: 'role', activePod: '${r.pod.id}', activeRole: '${r.role.id}', search: '' }); setTimeout(() => { setState({ expandedSkills: { ...state.expandedSkills, '${r.skill.id}': true } }); }, 50)">
              <div class="flex items-center gap-2 mb-1">
                <div class="w-2.5 h-2.5 rounded-full" style="background: ${r.pod.color}"></div>
                <span class="text-sm font-medium text-white">${r.skill.name}</span>
              </div>
              <div class="text-[11px] text-slate-600 mb-2">${r.pod.name} &rarr; ${r.role.name}</div>
              ${r.subMatches.length > 0 ? `<div class="flex flex-wrap gap-1">${r.subMatches.map(s => `<span class="sub-skill-tag">${s}</span>`).join('')}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderGraph() {
  const filterChips = SKILL_GRAPH.map(pod => {
    const isActive = !state.graphFilter || state.graphFilter === pod.id;
    return `<span class="graph-filter-chip ${isActive ? 'active' : ''}" style="background: ${pod.color}15; color: ${pod.color}; border-color: ${pod.color}44" onclick="event.stopPropagation(); setState({ graphFilter: state.graphFilter === '${pod.id}' ? null : '${pod.id}', view: 'graph' })">${pod.name}</span>`;
  }).join('');

  return `
    <div class="relative" style="height: calc(100vh - 72px)">
      <div class="graph-filter-bar">${filterChips}</div>
      <canvas id="graph-canvas"></canvas>
      <div id="graph-tooltip" class="graph-tooltip" style="display:none"></div>
      <div id="graph-hover-panel" class="graph-hover-panel" style="display:none"></div>
      <div class="graph-legend">
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#6366f1"></span> Pod</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6366f1aa"></span> Role</span>
        <span><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#6366f155"></span> Skill</span>
        <span style="color:#475569">Scroll to zoom &middot; Drag to pan &middot; Drag nodes &middot; Double-click to open</span>
      </div>
      <div class="graph-controls">
        <button onclick="graphZoomIn()" title="Zoom in">+</button>
        <button onclick="graphZoomOut()" title="Zoom out">&minus;</button>
        <button onclick="graphReset()" title="Reset">&#8634;</button>
      </div>
    </div>
  `;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────
function render() {
  // Stop previous graph simulation
  if (graphSim) { graphSim.stop(); graphSim = null; }

  let content = '';
  if (state.search && state.search.length >= 2) {
    content = renderSearch();
  } else {
    switch (state.view) {
      case 'overview': content = renderOverview(); break;
      case 'pod': content = renderPod(); break;
      case 'role': content = renderRole(); break;
      case 'graph': content = renderGraph(); break;
      default: content = renderOverview();
    }
  }

  document.getElementById('app').innerHTML = renderHeader() + `<main>${content}</main>`;

  // Init graph if in graph view
  if (state.view === 'graph' && !state.search) {
    requestAnimationFrame(() => initGraph(state.graphFilter));
  }

  // Setup gif upload zones after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.gif-zone').forEach(el => {
      const skillId = el.id.replace('gif-', '');
      setupGifZone(el, skillId);
    });
  });
}

// ─── KEYBOARD NAV ─────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.search) { setState({ search: '' }); return; }
    if (state.view === 'graph') { setState({ view: 'overview', activePod: null, activeRole: null }); return; }
    if (state.view === 'role') { setState({ view: 'pod', activeRole: null }); return; }
    if (state.view === 'pod') { setState({ view: 'overview', activePod: null }); return; }
  }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.querySelector('.search-input')?.focus();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────
render();
</script>
